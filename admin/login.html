<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin · Sign in</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f1115; color: #e8eaed; display: grid; place-items: center; min-height: 100vh; }
    .card { background: #181b21; border: 1px solid #2a2f37; border-radius: 14px; padding: 28px; width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4); }
    h1 { font-size: 16px; margin: 0 0 4px; }
    p { color: #9aa1ab; font-size: 13px; margin: 0 0 18px; }
    input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333a44; background: #0f1115;
      color: #e8eaed; font-size: 14px; }
    button { width: 100%; margin-top: 12px; padding: 10px; border: 0; border-radius: 8px; background: #3b82f6;
      color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
    button:hover { background: #2f6fe0; }
    .err { color: #f87171; font-size: 13px; margin-top: 10px; min-height: 16px; }
  </style>
</head>
<body>
  <form class="card" id="f">
    <h1>Study admin</h1>
    <p>Enter the admin token to continue.</p>
    <input id="t" type="password" placeholder="ADMIN_TOKEN" autocomplete="current-password" autofocus/>
    <button type="submit">Sign in</button>
    <div class="err" id="e"></div>
  </form>
  <script>
    document.getElementById('f').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const token = document.getElementById('t').value;
      const e = document.getElementById('e');
      e.textContent = '';
      try {
        const r = await fetch('/admin/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        if (r.ok) { location.href = '/admin'; }
        else { const d = await r.json().catch(() => ({})); e.textContent = d.error || 'Invalid token.'; }
      } catch (err) { e.textContent = 'Network error.'; }
    });
  </script>
</body>
</html>
