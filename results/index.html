<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Study results · Thesis</title>

  <!-- Fonts load non-render-blocking: if the Google Fonts CDN is slow or
       unreachable, the page still renders immediately on the system-font
       fallbacks in the stacks below (CDN-hardened). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" media="print" onload="this.media='all'"
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap">
  <noscript><link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"></noscript>

  <script>(function(){var t=localStorage.getItem('results-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>

  <!-- React is vendored locally (production build) and this page's React code is
       precompiled to results/results.js by `npm run build` — so there is no
       runtime Babel and no CDN dependency to load the results surface. -->
  <script src="/vendor/react.production.min.js"></script>
  <script src="/vendor/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #ffffff; --surface: #ffffff; --surface-2: #f6f6f5; --surface-3: #efefee;
      --ink: #0d0d0d; --ink-2: #3a3a39; --muted: #8c8c88; --muted-2: #c2c2bd;
      --border: #ececea; --border-strong: #dcdcd8;
      --accent: #b5552f; --accent-soft: #f4e2d8; --accent-ink: #7a3318;
      --pos: #3f9d6a; --neg: #b5552f;
      --shadow-card: 0 1px 2px rgba(13,13,13,.04);
      --shadow-pop: 0 12px 40px -16px rgba(13,13,13,.22);
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 20px; --radius-pill: 999px;
      --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-serif: "Instrument Serif", ui-serif, Georgia, "Times New Roman", serif;
      --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }
    [data-theme="dark"] {
      --bg: #1a1a19; --surface: #212120; --surface-2: #2a2a28; --surface-3: #323230;
      --ink: #ececea; --ink-2: #cfcfca; --muted: #9a9a93; --muted-2: #6a6a64;
      --border: #323230; --border-strong: #42423f;
      --accent: #d9764d; --accent-soft: #36241b; --accent-ink: #e9b196;
      --pos: #5fb585; --neg: #d9764d;
      --shadow-card: 0 1px 2px rgba(0,0,0,.3);
      --shadow-pop: 0 16px 50px -18px rgba(0,0,0,.6);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: var(--font-sans); background: var(--bg); color: var(--ink);
      font-size: 14.5px; line-height: 1.55; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    a { color: var(--accent-ink); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; color: inherit; }
    .serif { font-family: var(--font-serif); font-weight: 400; letter-spacing: -0.01em; }
    .mono { font-family: var(--font-mono); }

    header { display: flex; align-items: center; gap: 16px; padding: 15px 24px;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5;
      background: color-mix(in oklch, var(--bg) 86%, transparent); backdrop-filter: saturate(1.4) blur(8px); }
    .brand { display: flex; align-items: center; gap: 9px; font-weight: 500; font-size: 15px; letter-spacing: -0.01em; }
    .brand .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .eyebrow-tag { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius-pill); }
    .tabs { display: flex; gap: 4px; margin-left: 4px; flex-wrap: wrap; }
    .tab { padding: 7px 14px; border-radius: var(--radius-pill); cursor: pointer; color: var(--muted);
      font-size: 13.5px; transition: background .15s ease, color .15s ease; }
    .tab:hover { color: var(--ink); }
    .tab.on { background: var(--surface-2); color: var(--ink); }
    .spacer { flex: 1; }

    .btn { display: inline-flex; align-items: center; gap: 7px; height: 36px; padding: 0 15px;
      border-radius: var(--radius-pill); font-size: 13.5px; font-weight: 500; line-height: 1;
      border: 1px solid var(--border-strong); background: transparent; color: var(--ink);
      transition: background .15s ease, border-color .15s ease, opacity .15s ease; text-decoration: none; }
    .btn:hover { background: var(--surface-2); text-decoration: none; }
    .icon-btn { width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--radius-pill); background: transparent; border: 1px solid var(--border-strong);
      color: var(--muted); font-size: 15px; transition: background .15s ease, color .15s ease; }
    .icon-btn:hover { background: var(--surface-2); color: var(--ink); }

    main { padding: 24px; max-width: 1180px; margin: 0 auto; }
    h1.page { font-family: var(--font-serif); font-weight: 400; font-size: 30px; letter-spacing: -0.01em; margin: 2px 0 2px; }
    .sub { color: var(--muted); margin: 0 0 18px; font-size: 13.5px; }

    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th, td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--border); }
    th { font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; }
    tbody tr { transition: background .12s ease; }
    tbody tr:hover td { background: var(--surface-2); }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
    code.id { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }
    .muted { color: var(--muted); }

    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 11px;
      border-radius: var(--radius-pill); font-size: 11px; font-weight: 500; color: var(--c, var(--muted));
      border: 1px solid color-mix(in oklch, var(--c, var(--border-strong)) 32%, transparent);
      background: color-mix(in oklch, var(--c, var(--surface)) 12%, var(--surface)); }
    .pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .s-completed, .s-done { --c: #3f9d6a; }
    .s-in_progress, .s-running { --c: #c2891f; }
    .s-started, .s-queued { --c: #4a78c2; }
    .s-abandoned, .s-failed { --c: var(--accent); }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 18px; }
    .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 16px; box-shadow: var(--shadow-card); }
    .metric .label { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .metric .big { font-family: var(--font-serif); font-size: 34px; line-height: 1; }
    .metric .small { font-size: 12.5px; color: var(--muted); margin-top: 6px; }
    .delta { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .delta.pos { color: var(--pos); } .delta.neg { color: var(--neg); }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 16px; box-shadow: var(--shadow-card); margin-bottom: 14px; }
    .panel h3 { margin: 0 0 11px; font-family: var(--font-mono); font-size: 10.5px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; }
    .kv { display: grid; grid-template-columns: auto 1fr; gap: 5px 14px; font-size: 13.5px; }
    .kv b { color: var(--muted); font-weight: 500; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 760px) { .grid2 { grid-template-columns: 1fr; } }
    .chat { display: flex; flex-direction: column; gap: 8px; max-height: 420px; overflow: auto; padding-right: 4px; }
    .bub { padding: 9px 12px; max-width: 88%; white-space: pre-wrap; line-height: 1.5; font-size: 13px; }
    .bub.user { align-self: flex-end; background: var(--surface-2); border-radius: 14px 14px 4px 14px; }
    .bub.other { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; }
    .col-head { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }

    .overlay { position: fixed; inset: 0; z-index: 20; padding: 24px; display: grid; place-items: center;
      background: color-mix(in oklch, var(--ink) 34%, transparent); backdrop-filter: blur(3px); animation: fade .2s ease; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
      width: min(1000px, 100%); max-height: 90vh; overflow: auto; padding: 24px; box-shadow: var(--shadow-pop); }
    .modal h2 { font-family: var(--font-serif); font-weight: 400; font-size: 25px; letter-spacing: -0.01em;
      margin: 0 0 4px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .close { float: right; cursor: pointer; color: var(--muted); font-size: 20px; line-height: 1;
      width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px; transition: background .15s ease, color .15s ease; }
    .close:hover { background: var(--surface-2); color: var(--ink); }
    .note { background: var(--surface-2); border: 1px solid var(--border); color: var(--ink-2);
      padding: 12px 14px; border-radius: var(--radius-md); font-size: 13px; line-height: 1.55; margin-bottom: 16px; }
    .note b { color: var(--ink); font-weight: 500; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Precompiled from results/results.jsx (npm run build); served gated, same as this page. -->
  <script src="/results/results.js"></script>
</body>
</html>
