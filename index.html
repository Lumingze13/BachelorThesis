<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <!-- viewport-fit=cover lets the layout reach under the notch / home indicator,
       so safe-area-inset-* padding can keep content clear of them. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <!-- Match the mobile browser chrome to the app surface (light + dark). -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
  <meta name="theme-color" content="#1a1a19" media="(prefers-color-scheme: dark)"/>
  <meta name="color-scheme" content="light dark"/>
  <title>Thesis — Future Self chatbot</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css"/>

  <!-- React is vendored locally (production build) and the app's .jsx is
       precompiled to build/*.js by `npm run build` — so there is no runtime
       Babel transpile and no CDN dependency for the app to start. -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="config.js"></script>
  <!-- Precompiled from the matching .jsx (npm run build); load order preserved. -->
  <script src="build/tweaks-panel.js"></script>
  <script src="build/graphics.js"></script>
  <script src="build/screens.js"></script>
  <script src="build/survey.js"></script>
  <script src="build/chat.js"></script>
  <script src="build/phaseb.js"></script>
  <script src="build/app.js"></script>
</body>
</html>
