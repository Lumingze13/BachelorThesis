# Local development Postgres for the study platform.
#   docker compose up -d
#   DATABASE_URL=postgresql://postgres:postgres@localhost:5432/thesis npm start
services:
  db:
    image: postgres:16-alpine
    container_name: thesis_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thesis
    ports:
      # Host 5433 to avoid clashing with a locally-installed Postgres on 5432.
      - "5433:5432"
    volumes:
      - thesis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thesis"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  thesis_pgdata:
